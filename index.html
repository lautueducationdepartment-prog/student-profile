<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>
</head>
<body>

<h2>Student Information</h2>

<img id="photo" width="150"><br><br>

<p>Name: <span id="name"></span></p>
<p>Reg No: <span id="regNo"></span></p>
<p>Batch: <span id="batch"></span></p>
<p>Roll No: <span id="rollNo"></span></p>
<p>Father Name: <span id="fatherName"></span></p>
<p>Mother Name: <span id="motherName"></span></p>
<p>DOB: <span id="dob"></span></p>
<p>Address: <span id="address"></span></p>
<p>Village/Township: <span id="villageTownship"></span></p>
<p>Contact: <span id="contact"></span></p>

<script>
const params = new URLSearchParams(window.location.search);
const regno = params.get("regno");

fetch(https://script.google.com/macros/s/AKfycbxD4Ac8xGxmSy9CpED0itXpP0aHw66nClVorToDKctW/dev + regno)
.then(res => res.json())
.then(data => {
    document.getElementById("name").innerText = data.name;
    document.getElementById("regNo").innerText = data.regNo;
    document.getElementById("batch").innerText = data.batch;
    document.getElementById("rollNo").innerText = data.rollNo;
    document.getElementById("fatherName").innerText = data.fatherName;
    document.getElementById("motherName").innerText = data.motherName;
    document.getElementById("dob").innerText = data.dob;
    document.getElementById("address").innerText = data.address;
    document.getElementById("villageTownship").innerText = data.villageTownship;
    document.getElementById("contact").innerText = data.contact;
    document.getElementById("photo").src = data.photo;
});
</script>

</body>
</html>
